name: Publish Mod

on: [ pull_request, workflow_dispatch ]

env:
  MOD_VERSION: 1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Run Game Tests
        run: bash ./gradlew runGameTest

      - name: Build All Versions
        run: bash ./gradlew buildAndCollect

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.G_TOKEN }}
          tag_name: "${{ env.MOD_VERSION }}"
          name: "${{ env.MOD_VERSION }}"
          files: build/libs/${{ env.MOD_VERSION }}/*.jar

      - name: Publish 1.21.8
        uses: BreadMoirai/mc-publish@master
        with:
          modrinth-token: ${{ secrets.M_TOKEN }}
          files: build/libs/${{ env.MOD_VERSION }}/waxableitemframes-${{ env.MOD_VERSION }}+1.21.8*.jar
          name: "${{ env.MOD_VERSION }}+1.21.8"
          version: "${{ env.MOD_VERSION }}+1.21.8"
          version-type: release
          loaders: fabric
          game-versions: "1.21.8"
          java: 21

      - name: Publish 1.21.9
        uses: BreadMoirai/mc-publish@master
        with:
          modrinth-token: ${{ secrets.M_TOKEN }}
          files: build/libs/${{ env.MOD_VERSION }}/waxableitemframes-${{ env.MOD_VERSION }}+1.21.9*.jar
          name: "${{ env.MOD_VERSION }}+1.21.9"
          version: "${{ env.MOD_VERSION }}+1.21.9"
          version-type: release
          loaders: fabric
          game-versions: "1.21.9"
          java: 21

      - name: Publish 1.21.10
        uses: BreadMoirai/mc-publish@master
        with:
          modrinth-token: ${{ secrets.M_TOKEN }}
          files: build/libs/${{ env.MOD_VERSION }}/waxableitemframes-${{ env.MOD_VERSION }}+1.21.10*.jar
          name: "${{ env.MOD_VERSION }}+1.21.10"
          version: "${{ env.MOD_VERSION }}+1.21.10"
          version-type: release
          loaders: fabric
          game-versions: "1.21.10"
          java: 21

      - name: Publish 1.21.11
        uses: BreadMoirai/mc-publish@master
        with:
          modrinth-token: ${{ secrets.M_TOKEN }}
          files: build/libs/${{ env.MOD_VERSION }}/waxableitemframes-${{ env.MOD_VERSION }}+1.21.11*.jar
          name: "${{ env.MOD_VERSION }}+1.21.11"
          version: "${{ env.MOD_VERSION }}+1.21.11"
          version-type: release
          loaders: fabric
          game-versions: "1.21.11"
          java: 21

      - name: Publish 26.1
        uses: BreadMoirai/mc-publish@master
        with:
          modrinth-token: ${{ secrets.M_TOKEN }}
          files: build/libs/${{ env.MOD_VERSION }}/waxableitemframes-${{ env.MOD_VERSION }}+26.1.jar
          name: "${{ env.MOD_VERSION }}+26.1"
          version: "${{ env.MOD_VERSION }}+26.1"
          version-type: release
          loaders: fabric
          game-versions: "26.1"
          java: 25

      - name: Publish 26.1.1
        uses: BreadMoirai/mc-publish@master
        with:
          modrinth-token: ${{ secrets.M_TOKEN }}
          files: build/libs/${{ env.MOD_VERSION }}/waxableitemframes-${{ env.MOD_VERSION }}+26.1.1.jar
          name: "${{ env.MOD_VERSION }}+26.1.1"
          version: "${{ env.MOD_VERSION }}+26.1.1"
          version-type: release
          loaders: fabric
          game-versions: "26.1.1"
          java: 25

      - name: Publish 26.1.2
        uses: BreadMoirai/mc-publish@master
        with:
          modrinth-token: ${{ secrets.M_TOKEN }}
          files: build/libs/${{ env.MOD_VERSION }}/waxableitemframes-${{ env.MOD_VERSION }}+26.1.2*.jar
          name: "${{ env.MOD_VERSION }}+26.1.2"
          version: "${{ env.MOD_VERSION }}+26.1.2"
          version-type: release
          loaders: fabric
          game-versions: "26.1.2"
          java: 25

      - name: Publish 26.2
        uses: BreadMoirai/mc-publish@master
        with:
          modrinth-token: ${{ secrets.M_TOKEN }}
          files: build/libs/${{ env.MOD_VERSION }}/waxableitemframes-${{ env.MOD_VERSION }}+26.2*.jar
          name: "${{ env.MOD_VERSION }}+26.2"
          version: "${{ env.MOD_VERSION }}+26.2"
          version-type: release
          loaders: fabric
          game-versions: "26.2"
          java: 25
